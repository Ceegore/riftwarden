name: Native Phase 04 Reference

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native_config:
    name: Native / config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@REPLACE_WITH_PHASE03_PINNED_SHA
        with:
          persist-credentials: false
      - uses: actions/setup-node@REPLACE_WITH_PHASE03_PINNED_SHA
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm cap:sync
      - run: pnpm verify:native-config
      - run: pnpm verify:plugin-contracts

  android_debug:
    name: Native / android-debug
    runs-on: ubuntu-latest
    needs: native_config
    steps:
      - uses: actions/checkout@REPLACE_WITH_PHASE03_PINNED_SHA
        with:
          persist-credentials: false
      - uses: actions/setup-node@REPLACE_WITH_PHASE03_PINNED_SHA
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm cap:sync
      - run: pnpm android:debug

  ios_simulator:
    name: Native / ios-simulator
    runs-on: [self-hosted, macOS, ARM64, xcode-26]
    needs: native_config
    steps:
      - uses: actions/checkout@REPLACE_WITH_PHASE03_PINNED_SHA
        with:
          persist-credentials: false
      - uses: actions/setup-node@REPLACE_WITH_PHASE03_PINNED_SHA
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm cap:sync
      - run: xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
