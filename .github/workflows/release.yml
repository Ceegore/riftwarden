name: Release Skeleton

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Protected release branch or immutable tag'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.source_ref }}
  cancel-in-progress: false

jobs:
  release_preflight:
    name: Release / verify-release
    if: vars.RIFTWARDEN_RELEASE_PIPELINE_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 90
    steps:
      - name: Checkout requested protected source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}
          persist-credentials: false
          fetch-depth: 0
      - name: Set up exact Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Verify source context and complete release gate
        run: |
          set -euo pipefail
          corepack enable
          test "${{ github.ref_name }}" = "main" || [[ "${{ inputs.source_ref }}" == v* || "${{ inputs.source_ref }}" == release/* ]]
          pnpm install --frozen-lockfile
          pnpm verify:release
          pnpm build:manifest -- --channel release --phase 47

  android_release:
    name: Release / android-aab
    if: vars.RIFTWARDEN_RELEASE_PIPELINE_ENABLED == 'true' && vars.RIFTWARDEN_PHASE_43_ANDROID_RELEASE_ENABLED == 'true'
    needs: release_preflight
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo 'Phase 43 must replace this guard with the reviewed Android release reusable workflow.' && exit 1

  ios_archive:
    name: Release / ios-archive
    if: vars.RIFTWARDEN_RELEASE_PIPELINE_ENABLED == 'true' && vars.RIFTWARDEN_PHASE_44_IOS_RELEASE_ENABLED == 'true'
    needs: release_preflight
    runs-on: macos-latest
    environment: release
    steps:
      - run: echo 'Phase 44 must replace this guard with the reviewed iOS archive reusable workflow.' && exit 1
