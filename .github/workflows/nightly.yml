name: Nightly

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: 'true'
  RIFTWARDEN_IMPLEMENTATION_PHASE: '3'

jobs:
  active_security:
    name: Nightly / dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up exact Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Enable Corepack and verify tool versions
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          node --version
          pnpm --version
          pnpm verify:repo
          pnpm verify:phase02
      - name: Frozen dependency install
        run: pnpm install --frozen-lockfile
      - run: pnpm deps:capture
      - run: pnpm deps:report
      - run: pnpm deps:sbom
      - run: pnpm security:audit
      - name: Upload nightly security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: riftwarden-nightly-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/security/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30

  mass_simulation:
    name: Nightly / mass-simulation
    if: vars.RIFTWARDEN_PHASE_22_MASS_SIM_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up exact Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Enable Corepack and verify tool versions
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          node --version
          pnpm --version
          pnpm verify:repo
          pnpm verify:phase02
      - name: Frozen dependency install
        run: pnpm install --frozen-lockfile
      - run: pnpm test:sim:mass

  dungeon_fuzzing:
    name: Nightly / dungeon-fuzzing
    if: vars.RIFTWARDEN_PHASE_28_DUNGEON_FUZZ_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up exact Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Enable Corepack and verify tool versions
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          node --version
          pnpm --version
          pnpm verify:repo
          pnpm verify:phase02
      - name: Frozen dependency install
        run: pnpm install --frozen-lockfile
      - run: pnpm test:dungeon:fuzz

  visual_matrix:
    name: Nightly / visual-matrix
    if: vars.RIFTWARDEN_PHASE_07_VISUAL_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up exact Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Enable Corepack and verify tool versions
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          node --version
          pnpm --version
          pnpm verify:repo
          pnpm verify:phase02
      - name: Frozen dependency install
        run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:visual

  device_farm:
    name: Nightly / device-farm
    if: vars.RIFTWARDEN_DEVICE_FARM_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: device-farm
    steps:
      - name: Explicit external device-farm integration point
        run: |
          echo 'Device-farm job must be replaced by the approved Phase-43/44 integration.'
          exit 1
