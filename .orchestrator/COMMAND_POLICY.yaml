# Riftwarden — Command Policy (deny-by-default, per operator choice)
# Derived from templates/COMMAND_POLICY.template.yaml (bundle v1.0.0)
version: "1.0"
default: "deny"

commands:
  # READ_ONLY - always safe
  - id: "git-status"
    category: "READ_ONLY"
    executable: "git"
    allowed_args_prefixes: [["status"], ["diff"], ["log"], ["rev-parse"], ["ls-files"], ["show"], ["branch"]]
  - id: "node-test"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["--test"], ["tools/requirements"]]
  - id: "node-validate-draft"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/validate.mjs", "--mode=draft"]]
  - id: "node-validate-gate"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/validate.mjs", "--mode=gate"]]
  - id: "node-audit-headings"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/audit-headings.mjs"]]
  - id: "node-build-reports"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/build-reports.mjs"]]
  - id: "node-check-external"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/check-external-decisions.mjs"]]
  - id: "node-check-phase-report"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/check-phase-report.mjs"]]
  - id: "node-hash-source"
    category: "BUILD_TEST"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/hash-source.mjs"]]
  - id: "node-canonicalize"
    category: "MUTATING_LOCAL"
    executable: "node"
    allowed_args_prefixes: [["tools/requirements/canonicalize-json.mjs"]]
  - id: "python-extract-docx"
    category: "BUILD_TEST"
    executable: "python"
    allowed_args_prefixes: [["tools/requirements/python/extract_docx_structure.py"]]
  - id: "python-find-markers"
    category: "BUILD_TEST"
    executable: "python"
    allowed_args_prefixes: [["tools/requirements/python/find_source_markers.py"]]
  - id: "git-add"
    category: "MUTATING_LOCAL"
    executable: "git"
    allowed_args_prefixes: [["add"]]
    note: "local git add on phase branch"
  - id: "git-commit"
    category: "MUTATING_LOCAL"
    executable: "git"
    allowed_args_prefixes: [["commit"]]
    note: "local commits allowed on phase branch; NO push/merge without human gate"
  - id: "sha256sum"
    category: "READ_ONLY"
    executable: "sha256sum"
    allowed_args_prefixes: [["docs"], ["tools"], ["src"], ["tests"]]

human_gate_categories:
  - "DEPENDENCY_CHANGE"
  - "DESTRUCTIVE"
  - "EXTERNAL_WRITE"

network:
  default: "deny"
  allowed_hosts:
    - "api.minimax.io"  # the adapter itself calls M3; child run_command is still network-denied

shell:
  allow_chaining: false
  allow_redirection: false
  allow_powershell_encoded_command: false
